databases:
  - name: recipe-db
    databaseName: recipe_db
    user: admin
    plan: free

services:
  # 2. バックエンド (Spring Boot)
  - type: web
    name: recipe-backend
    env: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      # DB接続情報 (Renderダッシュボードから手動で設定するためここは空にしておきます)
      # JWTやAPIのキー (Web設定画面から値を直接入れることでハードコードを防止)
      - key: JWT_SECRET
        sync: false # Renderのダッシュボードで手動設定
      - key: GOOGLE_API_KEY
        sync: false # Renderのダッシュボードで手動設定
      # CORS用
      - key: FRONTEND_URL
        value: https://recipe-frontend-12lp.onrender.com # 実際のフロントエンドURL

  # 3. フロントエンド (Static Site)
  - type: web
    name: recipe-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npx vite build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://recipe-backend.onrender.com # デプロイ後、ダッシュボードから実際のバックエンドURLに変更してください
